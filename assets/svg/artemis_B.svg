<!-- 아르테미스 — 플랫 아이콘 스타일 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 배경 원 -->
  <circle cx="60" cy="60" r="55" fill="#aaaadd"/>
  <!-- 배경 어두운 원 -->
  <circle cx="60" cy="60" r="50" fill="#080820"/>

  <!-- 머리카락 (단단히 묶인 사냥꾼 헤어) -->
  <path d="M38,54 Q30,68 34,86 Q44,100 60,102 Q76,100 86,86 Q90,68 82,54"
    fill="#334466"/>

  <!-- 초승달 머리띠 -->
  <!-- 달 모양 (C-shape, 좌로 열린) -->
  <path d="M44,40 Q36,44 36,56 Q36,64 44,68 Q38,64 38,54 Q38,46 44,40Z"
    fill="#aaaadd"/>
  <!-- 달 본체 (흰 부분) -->
  <path d="M44,40 Q54,38 60,40 Q70,44 72,54 Q70,64 60,68 Q54,70 44,68
           Q50,64 52,54 Q50,46 44,40Z"
    fill="#aaaadd"/>
  <!-- 달 안쪽 (어두운 면) -->
  <path d="M50,42 Q58,40 64,46 Q68,52 66,60 Q62,66 54,66
           Q52,60 54,52 Q52,46 50,42Z"
    fill="#080820"/>
  <!-- 달 하이라이트 -->
  <path d="M45,44 Q42,50 44,58 Q42,54 42,48 Q42,46 45,44Z"
    fill="#ccccee"/>

  <!-- 얼굴 타원 -->
  <ellipse cx="60" cy="68" rx="18" ry="20" fill="#c0c0ee"/>

  <!-- 귀 -->
  <ellipse cx="42" cy="68" rx="5" ry="6" fill="#9999cc"/>
  <ellipse cx="78" cy="68" rx="5" ry="6" fill="#9999cc"/>

  <!-- 눈썹 (날카롭고 독립적) -->
  <path d="M49,62 Q55,57 60,60" fill="none" stroke="#221144" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M71,62 Q65,57 60,60" fill="none" stroke="#221144" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 눈 (날카롭고 예리) -->
  <ellipse cx="53" cy="66" rx="4.5" ry="3.5" fill="white"/>
  <ellipse cx="67" cy="66" rx="4.5" ry="3.5" fill="white"/>
  <ellipse cx="53" cy="67" rx="3" ry="2.8" fill="#221144"/>
  <ellipse cx="67" cy="67" rx="3" ry="2.8" fill="#221144"/>
  <circle cx="54.5" cy="65.5" r="1" fill="white"/>
  <circle cx="68.5" cy="65.5" r="1" fill="white"/>
  <!-- 눈꼬리 날카롭게 -->
  <path d="M57.5,64.5 L60,63 L62.5,64.5" fill="none" stroke="#aaaadd" stroke-width="0.8"/>

  <!-- 코 -->
  <path d="M60,70 Q57,75 59,77 Q61,77 63,75 Q60,73 60,70Z" fill="#9090bb" stroke="none"/>

  <!-- 입 (단호하고 굳은) -->
  <path d="M53,80 Q60,83 67,80" fill="none" stroke="#334466" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 우측 화살+활 실루엣 -->
  <!-- 활 (bow) -->
  <path d="M86,54 Q96,68 86,82" fill="none" stroke="#aaaadd" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 활 시위 -->
  <line x1="86" y1="54" x2="86" y2="82" stroke="#aaaadd" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- 화살 -->
  <line x1="82" y1="60" x2="104" y2="76" stroke="#aaaadd" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 화살촉 -->
  <polygon points="104,76 97,71 99,78" fill="#aaaadd"/>
  <!-- 화살 깃 -->
  <path d="M82,60 L80,55 L85,58" fill="#8888bb"/>

  <!-- 하단: 초승달 심볼 (우측 하단) -->
  <path d="M75,92 Q70,92 68,97 Q68,104 74,106 Q68,104 68,100 Q68,94 75,92Z"
    fill="#aaaadd"/>
  <path d="M75,92 Q80,92 82,97 Q82,104 76,106 Q79,102 79,98 Q79,94 75,92Z"
    fill="#aaaadd"/>
</svg>
