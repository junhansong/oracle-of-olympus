<!-- 제우스 — 플랫 아이콘 스타일 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 배경 원 -->
  <circle cx="60" cy="60" r="55" fill="#ffd700"/>
  <!-- 배경 그라데이션 효과 (어두운 내원) -->
  <circle cx="60" cy="60" r="50" fill="#1a1400"/>

  <!-- 왕관 (황금) -->
  <polygon points="36,50 42,34 50,44 60,30 70,44 78,34 84,50 80,50 60,42 40,50"
    fill="#ffd700"/>
  <!-- 왕관 보석 (가운데) -->
  <polygon points="60,30 57,38 60,36 63,38" fill="#fff5cc"/>

  <!-- 얼굴 타원 -->
  <ellipse cx="60" cy="62" rx="18" ry="20" fill="#f5d78e"/>

  <!-- 수염 (하단 얼굴) -->
  <path d="M42,68 Q44,82 60,86 Q76,82 78,68" fill="#d4af37"/>
  <!-- 수염 결 -->
  <line x1="55" y1="74" x2="54" y2="84" stroke="#b8960c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="60" y1="76" x2="60" y2="86" stroke="#b8960c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="65" y1="74" x2="66" y2="84" stroke="#b8960c" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 눈썹 (굵고 강렬) -->
  <path d="M50,58 Q56,54 60,56" stroke="#5a3e0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M70,58 Q64,54 60,56" stroke="#5a3e0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- 눈 -->
  <ellipse cx="54" cy="62" rx="3.5" ry="3" fill="#1a1a2e"/>
  <ellipse cx="66" cy="62" rx="3.5" ry="3" fill="#1a1a2e"/>
  <!-- 눈 반짝임 -->
  <circle cx="55.5" cy="61" r="1" fill="white"/>
  <circle cx="67.5" cy="61" r="1" fill="white"/>

  <!-- 코 -->
  <path d="M60,64 Q57,70 59,72 Q61,72 63,70 Q60,68 60,64Z" fill="#e0b870" stroke="none"/>

  <!-- 번개 (오른쪽 아래) — 앱 액세트 -->
  <polygon points="76,76 70,90 75,90 68,104 83,86 77,86"
    fill="#ffd700"/>
  <polygon points="76,76 70,90 75,90 68,104 83,86 77,86"
    fill="none" stroke="#1a1400" stroke-width="0.8"/>

  <!-- 귀 -->
  <ellipse cx="42" cy="64" rx="5" ry="6" fill="#e8c87a"/>
  <ellipse cx="78" cy="64" rx="5" ry="6" fill="#e8c87a"/>
</svg>
