<!-- 헤파이스토스 — 플랫 아이콘 스타일 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 배경 원 -->
  <circle cx="60" cy="60" r="55" fill="#dd6600"/>
  <!-- 배경 어두운 원 -->
  <circle cx="60" cy="60" r="50" fill="#150800"/>

  <!-- 머리카락 (거칠고 두꺼운) -->
  <path d="M36,56 Q28,72 32,88 Q42,102 60,104 Q78,102 88,88 Q92,72 84,56"
    fill="#553300"/>

  <!-- 불꽃 왕관 -->
  <!-- 왕관 띠 -->
  <rect x="34" y="50" width="52" height="7" rx="3" fill="#bb4400"/>
  <!-- 불꽃 1 (좌측) -->
  <path d="M38,50 Q34,42 38,34 Q40,40 44,38 Q42,44 46,40 Q44,46 48,50 Z"
    fill="#dd6600"/>
  <!-- 불꽃 2 -->
  <path d="M48,50 Q46,40 50,32 Q52,38 56,36 Q54,42 58,38 Q56,44 60,50 Z"
    fill="#ff8800"/>
  <!-- 불꽃 3 (중앙, 가장 높음) -->
  <path d="M55,50 Q54,38 60,28 Q62,36 66,32 Q64,40 68,36 Q66,44 65,50 Z"
    fill="#dd6600"/>
  <!-- 불꽃 4 -->
  <path d="M62,50 Q60,40 64,32 Q66,38 70,36 Q68,42 72,38 Q70,44 74,50 Z"
    fill="#ff8800"/>
  <!-- 불꽃 5 (우측) -->
  <path d="M72,50 Q70,42 74,34 Q76,40 80,38 Q78,44 82,40 Q80,46 82,50 Z"
    fill="#dd6600"/>
  <!-- 불꽃 오버레이 (밝은 노란) -->
  <path d="M56,50 Q55,42 60,34 Q61,40 63,50 Z" fill="#ffcc00" opacity="0.7"/>
  <path d="M46,50 Q45,44 48,38 Q50,43 51,50 Z" fill="#ffcc00" opacity="0.5"/>

  <!-- 얼굴 타원 (약간 비대칭 — 절름발이 장인) -->
  <ellipse cx="61" cy="66" rx="19" ry="21" fill="#e0aa70"/>

  <!-- 귀 -->
  <ellipse cx="42" cy="67" rx="5" ry="6" fill="#c88850"/>
  <ellipse cx="80" cy="67" rx="5" ry="6" fill="#c88850"/>

  <!-- 눈썹 (굵고 찌푸린, 장인 집중) -->
  <path d="M49,60 Q55,55 61,58" fill="none" stroke="#3a1a00" stroke-width="3" stroke-linecap="round"/>
  <path d="M73,60 Q67,55 61,58" fill="none" stroke="#3a1a00" stroke-width="3" stroke-linecap="round"/>

  <!-- 눈 (강인하지만 약간 비대칭) -->
  <ellipse cx="54" cy="64" rx="4.5" ry="3.5" fill="white"/>
  <ellipse cx="68" cy="64" rx="4" ry="3" fill="white"/>
  <ellipse cx="54" cy="65" rx="3" ry="2.5" fill="#4a2200"/>
  <ellipse cx="68" cy="65" rx="2.8" ry="2.2" fill="#4a2200"/>
  <circle cx="55.5" cy="63.5" r="1" fill="white"/>
  <circle cx="69.2" cy="63.2" r="0.9" fill="white"/>

  <!-- 코 -->
  <path d="M61,68 Q58,73 60,75 Q62,75 64,73 Q61,71 61,68Z" fill="#c08050" stroke="none"/>

  <!-- 수염 (굵고 거친 장인 수염) -->
  <path d="M42,72 Q46,70 52,72 Q56,70 60,72 Q64,70 68,72 Q72,70 78,72
           Q78,84 61,88 Q44,84 42,72Z" fill="#553300"/>
  <!-- 수염 질감 -->
  <line x1="48" y1="74" x2="47" y2="86" stroke="#dd6600" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="54" y1="73" x2="53" y2="87" stroke="#dd6600" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="61" y1="73" x2="61" y2="88" stroke="#dd6600" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="68" y1="73" x2="69" y2="87" stroke="#dd6600" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="74" y1="74" x2="75" y2="85" stroke="#dd6600" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 땀방울 (장인 특유) -->
  <path d="M81,60 Q83,57 82,62 Q80,62 81,60Z" fill="#ffcc88" opacity="0.8"/>

  <!-- 좌측 망치 실루엣 -->
  <rect x="18" y="60" width="18" height="7" rx="3" fill="#dd6600"/>
  <line x1="27" y1="67" x2="27" y2="100" stroke="#dd6600" stroke-width="3" stroke-linecap="round"/>

  <!-- 하단 우측: 불꽃 심볼 -->
  <path d="M78,90 Q74,84 78,78 Q80,84 84,82 Q82,86 86,84 Q84,90 80,96 Q76,92 78,90Z"
    fill="#dd6600"/>
  <path d="M80,90 Q78,86 80,82 Q81,86 83,84 Q82,88 84,86 Q83,90 80,94 Q77,91 80,90Z"
    fill="#ffcc00" opacity="0.7"/>
</svg>
