<!-- 아레스 — 플랫 아이콘 스타일 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 배경 원 -->
  <circle cx="60" cy="60" r="55" fill="#cc4444"/>
  <!-- 배경 어두운 원 -->
  <circle cx="60" cy="60" r="50" fill="#1a0505"/>

  <!-- 전쟁 투구 본체 (강하고 각진) -->
  <!-- 투구 후면/전체 실루엣 -->
  <path d="M32,65 Q30,42 60,30 Q90,42 88,65 L88,78 Q88,88 78,90 L78,94 L42,94 L42,90 Q32,88 32,78 Z"
    fill="#cc4444"/>
  <!-- 투구 내면 어두운 부분 -->
  <path d="M40,62 Q40,44 60,36 Q80,44 80,62 L80,76 Q80,84 70,86 L50,86 Q40,84 40,76 Z"
    fill="#882222"/>

  <!-- 붉은 볏 (투구 위) -->
  <!-- 볏 받침 -->
  <rect x="52" y="28" width="16" height="6" rx="3" fill="#aa2222"/>
  <!-- 볏 본체 (앞뒤로 흐르는 빨간 볏) -->
  <path d="M34,28 Q44,20 60,28 Q76,20 86,28 Q72,34 60,32 Q48,34 34,28Z"
    fill="#cc4444"/>
  <path d="M36,28 Q46,22 60,28 Q74,22 84,28 Q70,32 60,30 Q50,32 36,28Z"
    fill="#ee5555"/>
  <!-- 볏 앞부분 -->
  <path d="M34,28 Q28,32 26,40 Q32,38 36,32 Z" fill="#cc4444"/>
  <!-- 볏 뒷부분 -->
  <path d="M86,28 Q92,32 94,40 Q88,38 84,32 Z" fill="#cc4444"/>

  <!-- 투구 바이저 (T형 개구부) -->
  <path d="M44,60 L44,52 Q44,44 60,42 Q76,44 76,52 L76,60 L70,60 L70,68 L50,68 L50,60 Z"
    fill="#1a0505"/>
  <!-- 바이저 세로 슬릿 -->
  <rect x="57" y="56" width="6" height="16" rx="3" fill="#cc4444"/>

  <!-- 뺨 가리개 -->
  <path d="M40,64 L40,82 Q40,88 46,88 L46,64 Z" fill="#aa3333"/>
  <path d="M80,64 L80,82 Q80,88 74,88 L74,64 Z" fill="#aa3333"/>

  <!-- 얼굴 (투구 안) -->
  <ellipse cx="60" cy="58" rx="13" ry="9" fill="#e08080"/>

  <!-- 눈 (강렬, 가는 눈) -->
  <ellipse cx="53" cy="57" rx="4" ry="2.8" fill="white"/>
  <ellipse cx="67" cy="57" rx="4" ry="2.8" fill="white"/>
  <ellipse cx="53" cy="57.5" rx="2.8" ry="2" fill="#440000"/>
  <ellipse cx="67" cy="57.5" rx="2.8" ry="2" fill="#440000"/>
  <circle cx="54.5" cy="56.5" r="0.9" fill="white"/>
  <circle cx="68.5" cy="56.5" r="0.9" fill="white"/>

  <!-- 눈썹 (굵고 찌푸린) -->
  <path d="M49,54 Q54,50 59,52" fill="none" stroke="#440000" stroke-width="3" stroke-linecap="round"/>
  <path d="M71,54 Q66,50 61,52" fill="none" stroke="#440000" stroke-width="3" stroke-linecap="round"/>

  <!-- 코 -->
  <path d="M60,60 Q57,64 59,65 Q61,65 63,64 Q60,63 60,60Z" fill="#c06060" stroke="none"/>

  <!-- 짧고 거친 수염 -->
  <path d="M48,62 Q52,60 60,62 Q68,60 72,62 Q72,70 60,73 Q48,70 48,62Z"
    fill="#882222"/>
  <line x1="52" y1="63" x2="52" y2="71" stroke="#cc4444" stroke-width="1" stroke-linecap="round"/>
  <line x1="56" y1="63" x2="55" y2="72" stroke="#cc4444" stroke-width="1" stroke-linecap="round"/>
  <line x1="60" y1="63" x2="60" y2="73" stroke="#cc4444" stroke-width="1" stroke-linecap="round"/>
  <line x1="64" y1="63" x2="65" y2="72" stroke="#cc4444" stroke-width="1" stroke-linecap="round"/>
  <line x1="68" y1="63" x2="68" y2="71" stroke="#cc4444" stroke-width="1" stroke-linecap="round"/>

  <!-- 하단: 검+방패 심볼 (우측) -->
  <!-- 방패 -->
  <path d="M72,88 L72,98 Q72,106 80,106 Q88,106 88,98 L88,88 Z" fill="#cc4444"/>
  <path d="M73,89 L73,98 Q73,104 80,104 Q87,104 87,98 L87,89 Z" fill="#1a0505"/>
  <line x1="80" y1="88" x2="80" y2="106" stroke="#cc4444" stroke-width="1.5"/>
  <line x1="72" y1="97" x2="88" y2="97" stroke="#cc4444" stroke-width="1.5"/>
  <!-- 검 -->
  <line x1="68" y1="86" x2="68" y2="108" stroke="#cc4444" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="68,86 65,92 71,92" fill="#cc4444"/>
  <rect x="64" y="92" width="8" height="3" rx="1" fill="#882222"/>
</svg>
