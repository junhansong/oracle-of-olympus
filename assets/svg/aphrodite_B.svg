<!-- 아프로디테 — 플랫 아이콘 스타일 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 배경 원 -->
  <circle cx="60" cy="60" r="55" fill="#ff88aa"/>
  <!-- 배경 어두운 원 -->
  <circle cx="60" cy="60" r="50" fill="#1a000a"/>

  <!-- 머리카락 (하단 곱슬 웨이브) -->
  <path d="M38,56 Q32,72 36,86 Q44,96 60,98 Q76,96 84,86 Q88,72 82,56"
    fill="#cc5577"/>
  <!-- 머리카락 곱슬 좌측 -->
  <path d="M38,56 Q30,60 32,72 Q34,68 38,64 Q36,74 40,80"
    fill="#aa3366" stroke="none"/>
  <!-- 머리카락 곱슬 우측 -->
  <path d="M82,56 Q90,60 88,72 Q86,68 82,64 Q84,74 80,80"
    fill="#aa3366" stroke="none"/>

  <!-- 얼굴 타원 -->
  <ellipse cx="60" cy="65" rx="20" ry="22" fill="#ffd0dc"/>

  <!-- 화관 / 꽃 왕관 -->
  <!-- 꽃잎들 -->
  <circle cx="44" cy="46" r="6" fill="#ff88aa"/>
  <circle cx="52" cy="38" r="7" fill="#ff5577"/>
  <circle cx="60" cy="35" r="8" fill="#ff88aa"/>
  <circle cx="68" cy="38" r="7" fill="#ff5577"/>
  <circle cx="76" cy="46" r="6" fill="#ff88aa"/>
  <!-- 꽃 중심 -->
  <circle cx="44" cy="46" r="2.5" fill="#ffe0ea"/>
  <circle cx="52" cy="38" r="3" fill="#ffe0ea"/>
  <circle cx="60" cy="35" r="3.5" fill="#ffe0ea"/>
  <circle cx="68" cy="38" r="3" fill="#ffe0ea"/>
  <circle cx="76" cy="46" r="2.5" fill="#ffe0ea"/>
  <!-- 화관 띠 -->
  <path d="M38,52 Q60,44 82,52" fill="none" stroke="#ff5577" stroke-width="3" stroke-linecap="round"/>

  <!-- 눈 (아몬드형, 화장) -->
  <ellipse cx="52" cy="62" rx="6" ry="4" fill="white"/>
  <ellipse cx="68" cy="62" rx="6" ry="4" fill="white"/>
  <ellipse cx="52" cy="63" rx="4" ry="3" fill="#cc2244"/>
  <ellipse cx="68" cy="63" rx="4" ry="3" fill="#cc2244"/>
  <!-- 아이라인 -->
  <path d="M46,60 Q52,56 58,60" fill="none" stroke="#660022" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M62,60 Q68,56 74,60" fill="none" stroke="#660022" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 눈 반짝임 -->
  <circle cx="50" cy="61" r="1.2" fill="white"/>
  <circle cx="66" cy="61" r="1.2" fill="white"/>

  <!-- 눈썹 (우아한 아치) -->
  <path d="M47,56 Q52,52 57,54" fill="none" stroke="#880033" stroke-width="2" stroke-linecap="round"/>
  <path d="M63,54 Q68,52 73,56" fill="none" stroke="#880033" stroke-width="2" stroke-linecap="round"/>

  <!-- 코 (작고 섬세) -->
  <path d="M60,66 Q58,70 59,72 Q61,72 62,70 Q60,68 60,66Z" fill="#ffaacc" stroke="none"/>

  <!-- 입 (하트 입술) -->
  <path d="M53,76 Q60,73 67,76 Q60,82 53,76Z" fill="#ff3366"/>
  <path d="M53,76 Q56,74 60,75 Q64,74 67,76" fill="#ff5588" stroke="none"/>

  <!-- 볼 홍조 -->
  <ellipse cx="44" cy="70" rx="6" ry="4" fill="#ff88aa" opacity="0.5"/>
  <ellipse cx="76" cy="70" rx="6" ry="4" fill="#ff88aa" opacity="0.5"/>

  <!-- 귀 -->
  <ellipse cx="40" cy="65" rx="5" ry="6" fill="#ffb8cc"/>
  <ellipse cx="80" cy="65" rx="5" ry="6" fill="#ffb8cc"/>
  <!-- 귀걸이 (하트) -->
  <path d="M37,72 Q35,74 37,76 Q39,74 37,72" fill="#ff88aa"/>
  <path d="M83,72 Q81,74 83,76 Q85,74 83,72" fill="#ff88aa"/>
</svg>
