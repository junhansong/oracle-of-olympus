<!-- 헤르메스 — 플랫 아이콘 스타일 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 배경 원 -->
  <circle cx="60" cy="60" r="55" fill="#44aaaa"/>
  <!-- 배경 어두운 원 -->
  <circle cx="60" cy="60" r="50" fill="#001a1a"/>

  <!-- 투구 (페타소스 — 챙 넓은 여행자 모자) -->
  <!-- 모자 챙 (넓게) -->
  <ellipse cx="60" cy="50" rx="28" ry="6" fill="#44aaaa"/>
  <!-- 모자 본체 (반돔형) -->
  <path d="M36,50 Q36,30 60,28 Q84,30 84,50Z" fill="#2d8888"/>

  <!-- 모자 날개 (좌) -->
  <path d="M32,50 Q20,44 18,52 Q22,58 34,54" fill="#44aaaa"/>
  <path d="M32,50 Q22,46 20,50 Q22,54 34,52" fill="#66cccc"/>
  <!-- 모자 날개 (우) -->
  <path d="M88,50 Q100,44 102,52 Q98,58 86,54" fill="#44aaaa"/>
  <path d="M88,50 Q98,46 100,50 Q98,54 86,52" fill="#66cccc"/>

  <!-- 모자 장식 띠 -->
  <path d="M36,50 Q60,54 84,50" fill="none" stroke="#66cccc" stroke-width="2"/>

  <!-- 얼굴 타원 -->
  <ellipse cx="60" cy="68" rx="18" ry="20" fill="#99dddd"/>

  <!-- 눈썹 (날카롭고 영리한) -->
  <path d="M49,62 Q54,58 59,60" fill="none" stroke="#003333" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M71,62 Q66,58 61,60" fill="none" stroke="#003333" stroke-width="2.2" stroke-linecap="round"/>

  <!-- 눈 (영리하고 장난기 있는) -->
  <ellipse cx="54" cy="66" rx="4" ry="3.5" fill="white"/>
  <ellipse cx="66" cy="66" rx="4" ry="3.5" fill="white"/>
  <ellipse cx="54" cy="67" rx="2.8" ry="2.5" fill="#004444"/>
  <ellipse cx="66" cy="67" rx="2.8" ry="2.5" fill="#004444"/>
  <!-- 눈 반짝임 -->
  <circle cx="55" cy="65.5" r="1" fill="white"/>
  <circle cx="67" cy="65.5" r="1" fill="white"/>

  <!-- 코 (날렵한) -->
  <path d="M60,69 Q57,74 59,76 Q61,76 63,74 Q60,72 60,69Z" fill="#77cccc"/>

  <!-- 입 (미소, 장난기) -->
  <path d="M53,80 Q60,85 67,80" fill="none" stroke="#003333" stroke-width="2" stroke-linecap="round"/>
  <!-- 보조개 -->
  <circle cx="51" cy="79" r="1.2" fill="#55bbbb"/>
  <circle cx="69" cy="79" r="1.2" fill="#55bbbb"/>

  <!-- 귀 -->
  <ellipse cx="42" cy="68" rx="5" ry="6" fill="#88cccc"/>
  <ellipse cx="78" cy="68" rx="5" ry="6" fill="#88cccc"/>

  <!-- 카두케우스 (소형, 우측 하단) -->
  <line x1="76" y1="82" x2="76" y2="104" stroke="#44aaaa" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M76,86 Q69,90 76,94 Q83,90 76,86" fill="none" stroke="#66cccc" stroke-width="1.5"/>
  <path d="M76,94 Q69,98 76,102 Q83,98 76,94" fill="none" stroke="#66cccc" stroke-width="1.5"/>
  <!-- 날개 (카두케우스) -->
  <path d="M76,84 Q68,80 64,84 Q68,86 74,86" fill="#44aaaa"/>
  <path d="M76,84 Q84,80 88,84 Q84,86 78,86" fill="#44aaaa"/>
</svg>
